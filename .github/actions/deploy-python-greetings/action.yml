name: Deploy python greetings
description: Stop existing PM2 process and start python-greetings on selected port

inputs:
  service-path:
    description: Path to python-greetings repository
    required: true
  environment-name:
    description: Environment name (dev/stg/preprod/prod)
    required: true
  port:
    description: Port number
    required: true

runs:
  using: composite
  steps:
    - name: Prepare stable deploy directory
      shell: powershell
      run: |
        $deployRoot = "C:\greetings-deploy"
        $targetDir = Join-Path $deployRoot "${{ inputs.environment-name }}"

        Write-Host "Preparing deploy directory: $targetDir"

        if (!(Test-Path $deployRoot)) {
          New-Item -ItemType Directory -Path $deployRoot | Out-Null
        }

        if (Test-Path $targetDir) {
          Remove-Item -Recurse -Force $targetDir
        }

        Copy-Item -Recurse -Force "${{ inputs.service-path }}" $targetDir

    - name: Ensure venv exists and dependencies are installed
      shell: powershell
      run: |
        $targetDir = "C:\greetings-deploy\${{ inputs.environment-name }}"
        Set-Location $targetDir

        python -m venv venv
        .\venv\Scripts\python.exe -m pip install --upgrade pip
        .\venv\Scripts\python.exe -m pip install -r requirements.txt

    - name: Stop old PM2 service if exists
      shell: powershell
      run: |
        pm2 delete greetings-app-${{ inputs.environment-name }}
        if ($LASTEXITCODE -ne 0) {
          Write-Host "Service greetings-app-${{ inputs.environment-name }} not found, continuing..."
          exit 0
        }

    - name: Start service with PM2
      shell: powershell
      run: |
        $targetDir = "C:\greetings-deploy\${{ inputs.environment-name }}"
        $pythonPath = Join-Path $targetDir "venv\Scripts\python.exe"
        $appPath = Join-Path $targetDir "app.py"

        Write-Host "Starting greetings-app-${{ inputs.environment-name }} on port ${{ inputs.port }}..."
        Write-Host "Using app: $appPath"
        Write-Host "Using interpreter: $pythonPath"

        $env:PORT="${{ inputs.port }}"
        pm2 start $appPath --name greetings-app-${{ inputs.environment-name }} --interpreter $pythonPath

    - name: Show PM2 process list
      shell: powershell
      run: |
        pm2 list