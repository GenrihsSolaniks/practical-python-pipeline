name: Python Greetings Pipeline

on:
  push:
  workflow_dispatch:

jobs:
  install-pip-deps:
    runs-on: self-hosted
    steps:
      - name: Install pip dependencies stage
        run: echo "Installing all required dependencies..."
      - uses: actions/checkout@v4
      - name: Clone python-greetings repository
        uses: actions/checkout@v4
        with:
          repository: mtararujs/python-greetings
          path: python-greetings
      - name: Install Python dependencies
        uses: ./.github/actions/install-pip-deps
        with:
          service-path: python-greetings

  deploy-to-dev:
    runs-on: self-hosted
    needs: install-pip-deps
    steps:
      - name: Deploy to dev stage
        run: echo "Deploying application to dev environment..."
      - uses: actions/checkout@v4
      - name: Clone python-greetings repository
        uses: actions/checkout@v4
        with:
          repository: mtararujs/python-greetings
          path: python-greetings
      - name: Deploy service to dev
        uses: ./.github/actions/deploy-python-greetings
        with:
          service-path: python-greetings
          environment-name: dev
          port: "7001"

  tests-on-dev:
    runs-on: self-hosted
    needs: deploy-to-dev
    steps:
      - name: Test on dev stage
        run: echo "Running API tests on dev environment..."
      - uses: actions/checkout@v4
      - name: Clone JS API framework repository
        uses: actions/checkout@v4
        with:
          repository: mtararujs/course-js-api-framework
          path: course-js-api-framework
      - name: Run dev tests
        uses: ./.github/actions/test-js-api
        with:
          tests-path: course-js-api-framework
          environment-name: dev

  deploy-to-stg:
    runs-on: self-hosted
    needs: tests-on-dev
    steps:
      - name: Deploy to stg stage
        run: echo "Deploying application to stg environment..."
      - uses: actions/checkout@v4
      - name: Clone python-greetings repository
        uses: actions/checkout@v4
        with:
          repository: mtararujs/python-greetings
          path: python-greetings
      - name: Deploy service to stg
        uses: ./.github/actions/deploy-python-greetings
        with:
          service-path: python-greetings
          environment-name: stg
          port: "7002"

  tests-on-stg:
    runs-on: self-hosted
    needs: deploy-to-stg
    steps:
      - name: Test on stg stage
        run: echo "Running API tests on stg environment..."
      - uses: actions/checkout@v4
      - name: Clone JS API framework repository
        uses: actions/checkout@v4
        with:
          repository: mtararujs/course-js-api-framework
          path: course-js-api-framework
      - name: Run stg tests
        uses: ./.github/actions/test-js-api
        with:
          tests-path: course-js-api-framework
          environment-name: stg

  deploy-to-preprod:
    runs-on: self-hosted
    needs: tests-on-stg
    steps:
      - name: Deploy to preprod stage
        run: echo "Deploying application to preprod environment..."
      - uses: actions/checkout@v4
      - name: Clone python-greetings repository
        uses: actions/checkout@v4
        with:
          repository: mtararujs/python-greetings
          path: python-greetings
      - name: Deploy service to preprod
        uses: ./.github/actions/deploy-python-greetings
        with:
          service-path: python-greetings
          environment-name: preprod
          port: "7003"

  tests-on-preprod:
    runs-on: self-hosted
    needs: deploy-to-preprod
    steps:
      - name: Test on preprod stage
        run: echo "Running API tests on preprod environment..."
      - uses: actions/checkout@v4
      - name: Clone JS API framework repository
        uses: actions/checkout@v4
        with:
          repository: mtararujs/course-js-api-framework
          path: course-js-api-framework
      - name: Run preprod tests
        uses: ./.github/actions/test-js-api
        with:
          tests-path: course-js-api-framework
          environment-name: preprod

  deploy-to-prod:
    runs-on: self-hosted
    needs: tests-on-preprod
    steps:
      - name: Deploy to prod stage
        run: echo "Deploying application to prod environment..."
      - uses: actions/checkout@v4
      - name: Clone python-greetings repository
        uses: actions/checkout@v4
        with:
          repository: mtararujs/python-greetings
          path: python-greetings
      - name: Deploy service to prod
        uses: ./.github/actions/deploy-python-greetings
        with:
          service-path: python-greetings
          environment-name: prod
          port: "7004"

  tests-on-prod:
    runs-on: self-hosted
    needs: deploy-to-prod
    steps:
      - name: Test on prod stage
        run: echo "Running API tests on prod environment..."
      - uses: actions/checkout@v4
      - name: Clone JS API framework repository
        uses: actions/checkout@v4
        with:
          repository: mtararujs/course-js-api-framework
          path: course-js-api-framework
      - name: Run prod tests
        uses: ./.github/actions/test-js-api
        with:
          tests-path: course-js-api-framework
          environment-name: prod